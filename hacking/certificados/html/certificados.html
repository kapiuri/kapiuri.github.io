<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Certificados SSL/TLS</title>
    <link rel="stylesheet" href="../css/stylecertificados.css">
    <!-- Cargar la biblioteca Forge -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.0/forge.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Generador de Certificados SSL/TLS</h1>
        <form id="certForm">
            <input type="text" id="domain" placeholder="Introduce el dominio" required>
            <input type="text" id="organization" placeholder="Organización">
            <input type="text" id="organizationalUnit" placeholder="Unidad Organizativa">
            <input type="text" id="country" placeholder="País">
            <input type="text" id="state" placeholder="Provincia">
            <input type="text" id="locality" placeholder="Localidad">
            <input type="number" id="validityYears" placeholder="Número de años de validez" value="1">
            <select id="format">
                <option value="pem">PEM</option>
                <option value="der">DER</option>
                <option value="pfx">PFX</option>
                <option value="pkcs7">PKCS#7</option>
                <option value="crt">CRT</option>
            </select>
            <button type="submit">Generar</button>
        </form>
        <div id="feedback">
            <pre id="result"></pre>
            <a id="downloadLink" href="#" download="certificado.pem" style="display:none;">Descargar Certificado</a>
        </div>
    </div>
    <!-- Cargar tu script después de Forge -->
    <script src="../js/scriptcertificados.js"></script>
    <script>
        // Verificar si Forge está disponible
        if (typeof forge === 'undefined') {
            alert('La biblioteca Forge no está disponible. Por favor, revisa la URL del CDN y la conexión a internet.');
        }
    </script>
</body>
</html>
