<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas</title>
    <link rel="stylesheet" href="../css/stylecontraseña.css">
</head>
<body>
    <div class="container">
        <h1>Generador de Contraseñas</h1>
        <form id="passwordForm">
            <label for="length">Longitud:</label>
            <input type="number" id="length" name="length" min="1" max="50" value="16">
            
            <label><input type="checkbox" id="includeLower" checked> Letras minúsculas</label>
            <label><input type="checkbox" id="includeUpper" checked> Letras mayúsculas</label>
            <label><input type="checkbox" id="includeNumbers" checked> Números</label>
            <label><input type="checkbox" id="includeSymbols"> Símbolos</label>
            
            <button type="button" id="generate">Generar Contraseña</button>
        </form>
        <input type="text" id="password" readonly>
    </div>
    <script src="../js/scriptcontraseña.js"></script>
</body>
</html>
