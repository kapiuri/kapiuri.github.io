<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de IP con ipinfo.io</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Consulta de IP con ipinfo.io</h1>
        <input type="text" id="ipAddress" placeholder="Introduce una dirección IP">
        <button onclick="getIPInfo()">Consultar</button>
        <div id="result">
            <p><strong>IP:</strong> <span id="ip">No disponible</span></p>
            <p><strong>Ciudad:</strong> <span id="city">No disponible</span></p>
            <p><strong>Región:</strong> <span id="region">No disponible</span></p>
            <p><strong>País:</strong> <span id="country">No disponible</span></p>
            <p><strong>Ubicación:</strong> <span id="location">No disponible</span></p>
            <p><strong>Organización:</strong> <span id="org">No disponible</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
