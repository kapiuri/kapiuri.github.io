<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluador de Seguridad de Contraseñas</title>
    <link rel="stylesheet" href="../css/styleevaluador.css">
</head>
<body>
    <div class="container">
        <h1>Evaluador de Seguridad de Contraseñas</h1>
        <form id="passwordForm">
            <label for="password">Introduce una contraseña:</label>
            <input type="text" id="password" placeholder="Contraseña" required>
            <div id="strength">
                <div class="strength-bar"></div>
            </div>
            <button type="submit">Evaluar</button>
        </form>
        <div id="feedback">
            <pre id="result"></pre>
            <div id="criteria">
                <p><input type="checkbox" id="lengthCriteria" disabled> Longitud mínima de 8 caracteres</p>
                <p><input type="checkbox" id="uppercaseCriteria" disabled> Contiene letras mayúsculas</p>
                <p><input type="checkbox" id="lowercaseCriteria" disabled> Contiene letras minúsculas</p>
                <p><input type="checkbox" id="numberCriteria" disabled> Contiene números</p>
                <p><input type="checkbox" id="specialCharCriteria" disabled> Contiene caracteres especiales</p>
            </div>
        </div>
    </div>
    <script src="../js/scriptevaluador.js"></script>
</body>
</html>
