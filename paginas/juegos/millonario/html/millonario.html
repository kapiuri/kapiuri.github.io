<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Millonario</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../../../../assets/iconos/ico-millonario.ico" type="image/x-icon">

</head>
<body>
    <div id="game-container">
        <h1>Desafío Millonario</h1>
        <div id="question-container">
            <p id="question">Pregunta aparecerá aquí</p>
            <div id="answers">
                <button class="answer-button" onclick="checkAnswer(0)">Opción A</button>
                <button class="answer-button" onclick="checkAnswer(1)">Opción B</button>
                <button class="answer-button" onclick="checkAnswer(2)">Opción C</button>
                <button class="answer-button" onclick="checkAnswer(3)">Opción D</button>
            </div>
        </div>
        <div id="game-controls">
            <button id="fifty-fifty" onclick="useFiftyFifty()">50:50</button>
            <button id="call-friend" onclick="callAFriend()">Llamada a un Amigo</button>
            <button id="ask-audience" onclick="askTheAudience()">Preguntar al Público</button>
            <button id="change-question" onclick="changeQuestion()">Sustitución de Pregunta</button>
        </div>
        <p id="feedback"></p>
        <p id="score">Puntos: 0</p>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
