<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Códigos QR</title>
    <link rel="shortcut icon" href="../../../../assets/iconos/ico-qr.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/styleqr.css">
</head>
<body>
    <div class="container">
        <h1>Generador de Códigos QR</h1>
        <input type="text" id="qr-text" placeholder="Introduce el texto aquí">
        <button id="generate-btn">Generar Código QR</button>
        <div id="qrcode"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="../js/scriptqr.js"></script>
</body>
</html>
