<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Hashes</title>
  <link rel="stylesheet" href="../css/stylehash.css">
</head>
<body>
  <div class="contenedor">
    <h1>Calculadora de Hashes</h1>
    <div class="grupo-formulario">
      <label for="archivo">Archivo:</label>
      <input type="file" id="archivo" placeholder="Sube el archivo aquí">
    </div>
    <div class="grupo-formulario">
      <label for="tipo-hash">Selecciona el tipo de Hash:</label>
      <select id="tipo-hash">
        <option value="MD5">MD5</option>
        <option value="SHA-1">SHA-1</option>
        <option value="SHA-256">SHA-256</option>
        <option value="SHA-512">SHA-512</option>
        <option value="RIPEMD-160">RIPEMD-160</option>
        <option value="SHA3-256">SHA3-256</option>
      </select>
    </div>
    <button onclick="calcularHash()">Calcular Hash</button>
    <div class="resultado">
      <h3>Resultado:</h3>
      <p id="resultado-hash"></p>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
  <script src="../js/scripthash.js"></script>
</body>
</html>
